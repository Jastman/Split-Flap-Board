version: '3.8'

services:
  flipflap:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - flipflap_data:/data
    environment:
      - NODE_ENV=production
      - SQLITE_PATH=/data/flipflap.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/board"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  flipflap_data:
    driver: local
